<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWM – Clio Note Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg-info: #e6f1fb;
      --bd: rgba(0,0,0,0.12);
      --bd-hov: rgba(0,0,0,0.25);
      --bd-str: rgba(0,0,0,0.4);
      --bd-ok: rgba(15,110,86,0.4);
      --tx: #1a1a18;
      --tx2: #5f5e5a;
      --tx3: #888780;
      --tx-info: #185fa5;
      --tx-ok: #0f6e56;
      --p-bg: #e6f1fb;
      --p-bd: rgba(24,95,165,0.35);
      --p-tx: #185fa5;
      --r: 8px;
      --rl: 12px;
      --f: 'IBM Plex Sans', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1e1e1c; --bg2:#2a2a28; --bg-info:#0c2d4a;
        --bd:rgba(255,255,255,0.1); --bd-hov:rgba(255,255,255,0.22); --bd-str:rgba(255,255,255,0.35); --bd-ok:rgba(93,202,165,0.3);
        --tx:#e8e6df; --tx2:#a8a69f; --tx3:#6e6d69; --tx-info:#85b7eb; --tx-ok:#5dcaa5;
        --p-bg:#0c2d4a; --p-bd:rgba(133,183,235,0.35); --p-tx:#85b7eb;
      }
    }

    body { font-family:var(--f); background:var(--bg2); color:var(--tx); min-height:100vh; padding:2rem 1rem 4rem; }

    .app { max-width:700px; margin:0 auto; background:var(--bg); border-radius:var(--rl); border:.5px solid var(--bd); padding:2rem 1.75rem 2.5rem; }

    .hdr { display:flex; align-items:center; gap:12px; margin-bottom:1.75rem; padding-bottom:1.25rem; border-bottom:.5px solid var(--bd); }
    .hdr-ico { width:36px; height:36px; background:var(--bg-info); border-radius:var(--r); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .hdr-ico svg { width:18px; height:18px; stroke:var(--tx-info); }
    .hdr h1 { font-size:16px; font-weight:500; letter-spacing:-.01em; }
    .hdr p  { font-size:12px; color:var(--tx2); margin-top:2px; }

    .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:1.75rem; }
    .tab {
      background:var(--bg2); border:.5px solid var(--bd); border-radius:var(--r);
      padding:9px 6px; font-family:var(--f); font-size:11.5px; font-weight:400;
      color:var(--tx2); cursor:pointer; text-align:center; line-height:1.3; transition:all .15s;
    }
    .tab:hover { color:var(--tx); border-color:var(--bd-hov); }
    .tab.active { background:var(--bg); border-color:var(--bd-str); color:var(--tx); font-weight:500; }

    .fs { margin-bottom:1.35rem; }
    .fl { display:block; font-size:11px; font-weight:500; color:var(--tx2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; }
    .hint { font-size:12px; color:var(--tx3); margin-top:4px; font-style:italic; }
    .sub  { font-size:12px; font-weight:500; color:var(--tx2); margin-bottom:6px; }

    input.fi, textarea.ft {
      width:100%; background:var(--bg); border:.5px solid var(--bd); border-radius:var(--r);
      padding:10px 13px; font-family:var(--f); font-size:14px; color:var(--tx);
      outline:none; transition:border-color .15s;
    }
    input.fi:focus, textarea.ft:focus { border-color:var(--bd-str); }
    textarea.ft { resize:vertical; min-height:75px; line-height:1.55; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .pg { display:flex; flex-wrap:wrap; gap:6px; }
